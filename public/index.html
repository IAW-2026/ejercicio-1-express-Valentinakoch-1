<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto con fetch</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="hero">
    <section class="hero-card">
      <p class="eyebrow">Ejercicio 10</p>
      <h1>Envio de datos con fetch</h1>
      <p>Completa el formulario para enviar un <strong>POST</strong> a <strong>/api/contacto</strong>.</p>

      <form id="contactoForm" class="contact-form">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" placeholder="Tu nombre" required>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje" required></textarea>

        <button type="submit">Enviar mensaje</button>
      </form>

      <p id="respuesta" class="respuesta" aria-live="polite"></p>
    </section>
  </main>
  <script src="/script.js"></script>
</body>
</html>
