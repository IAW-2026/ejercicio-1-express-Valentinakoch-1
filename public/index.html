<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes en memoria</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">Inicio</a>
    </nav>
  </header>
  <main class="hero">
    <section class="hero-card">
      <p class="eyebrow">Ejercicio 8</p>
      <h1>Mostrar mensajes enviados</h1>
      <p>Escribi un mensaje y guardalo en memoria.</p>
      <form action="/mensajes" method="POST">
        <label for="mensaje">Mensaje:</label>
        <br>
        <textarea id="mensaje" name="mensaje" rows="4" cols="30" required></textarea>
        <br>
        <button type="submit">Enviar mensaje</button>
      </form>
    </section>
  </main>
</body>
</html>
