<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API de productos</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">Inicio</a>
    </nav>
  </header>
  <main class="hero">
    <section class="hero-card">
      <p class="eyebrow">Ejercicio 9</p>
      <h1>Simulacion de API con JSON</h1>
      <p>Hace clic para traer productos desde <strong>/api/productos</strong>.</p>
      <button id="cargarProductos">Cargar productos</button>
      <ul id="listaProductos"></ul>
    </section>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const button = document.getElementById('cargarProductos');
      const lista = document.getElementById('listaProductos');

      button.addEventListener('click', async () => {
        lista.innerHTML = '<li>Cargando productos...</li>';

        try {
          const response = await fetch('/api/productos');

          if (!response.ok) {
            throw new Error('No se pudo cargar la lista de productos.');
          }

          const productos = await response.json();

          lista.innerHTML = productos
            .map(
              (producto) =>
                `<li>#${producto.id} - ${producto.nombre} ($${producto.precio})</li>`
            )
            .join('');
        } catch (error) {
          lista.innerHTML = `<li>${error.message}</li>`;
        }
      });
    });
  </script>
</body>
</html>
