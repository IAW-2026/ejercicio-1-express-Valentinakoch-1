<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encuesta simple</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">Inicio</a>
    </nav>
  </header>
  <main class="hero">
    <section class="hero-card">
      <p class="eyebrow">Ejercicio 7</p>
      <h1>Encuesta simple</h1>
      <p>¿Cual es tu lenguaje favorito?</p>
      <form action="/encuesta" method="POST">
        <label for="lenguaje">Elegi una opcion:</label>
        <br>
        <select id="lenguaje" name="lenguaje" required>
          <option value="" disabled selected>Selecciona uno</option>
          <option value="JavaScript">JavaScript</option>
          <option value="Python">Python</option>
          <option value="Java">Java</option>
          <option value="C#">C#</option>
        </select>
        <br>
        <button type="submit">Enviar respuesta</button>
      </form>
    </section>
  </main>
</body>
</html>
